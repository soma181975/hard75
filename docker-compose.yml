services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hard75
      POSTGRES_PASSWORD: hard75
      POSTGRES_DB: hard75
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/seed-dev.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hard75"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/hard75-photos;
      mc anonymous set download myminio/hard75-photos;
      exit 0;
      "

  app:
    build: .
    ports:
      - "8080:8000"
    environment:
      - APP_ENV=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
      - DATABASE_URL=postgresql://hard75:hard75@postgres:5432/hard75
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=hard75-photos
      - S3_REGION=us-east-1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=http://localhost:8080/auth/callback
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-hard75.letsdo@gmail.com}
      - ADMIN_NAME=${ADMIN_NAME:-Admin User}
    volumes:
      - ./src:/app/src
      - ./static:/app/static
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Email agent - requires Gmail API credentials
  # To enable:
  # 1. Get credentials.json from Google Cloud Console
  # 2. Run: python scripts/generate_gmail_token.py
  # 3. Start with: docker compose --profile agent up -d
  agent:
    build: .
    command: python -m src.agent.runner
    profiles:
      - agent
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://hard75:hard75@postgres:5432/hard75
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=hard75-photos
      - S3_REGION=us-east-1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GMAIL_CREDENTIALS_FILE=/app/credentials.json
      - GMAIL_TOKEN_FILE=/app/token.pickle
    volumes:
      - ./src:/app/src
      - ./token.pickle:/app/token.pickle:ro
      - ./credentials.json:/app/credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
