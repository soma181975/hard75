{% if photos %}
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    {% for photo in photos %}
    <div class="relative group">
        <img src="{{ photo.photo_url }}"
             alt="Day {{ photo.day_number }}"
             class="w-full h-40 object-cover rounded-lg">
        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-30 transition-opacity rounded-lg flex items-end">
            <div class="p-2 text-white opacity-0 group-hover:opacity-100 transition-opacity">
                <p class="text-sm font-medium">Day {{ photo.day_number }}</p>
                <p class="text-xs">{{ photo.date }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-8">
    <svg class="w-12 h-12 mx-auto text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
    <p class="text-gray-500 mt-2">No progress photos yet</p>
    <p class="text-sm text-gray-400 mt-1">Email your daily photos to get started!</p>
</div>
{% endif %}
